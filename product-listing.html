<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Listing — Filter &amp; Sort</title>
<style>
  * { box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f2f4f3;
    color: #1c1c1c;
    margin: 0;
  }

  header {
    background: #0d5c4f;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
  header p { margin: 4px 0 0 0; opacity: 0.9; }

  main {
    max-width: 1000px;
    margin: 30px auto;
    padding: 0 20px;
  }

  .controls {
    background: #fff;
    border-radius: 12px;
    padding: 18px 22px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    margin-bottom: 24px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-group label { font-size: 13px; font-weight: bold; color: #0d5c4f; }

  select {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  #resultCount { margin-left: auto; font-size: 14px; color: #555; }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  @media (max-width: 800px) {
    .product-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .product-grid { grid-template-columns: 1fr; }
    .controls { flex-direction: column; align-items: stretch; }
    #resultCount { margin-left: 0; }
  }

  .product-card {
    background: #fff;
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .product-card .category {
    display: inline-block;
    align-self: flex-start;
    background: #e2ece9;
    color: #0d5c4f;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 10px;
    text-transform: uppercase;
  }

  .product-card h3 { margin: 4px 0; color: #1c1c1c; }
  .product-card .price { font-size: 18px; font-weight: bold; color: #0d5c4f; }
  .product-card .rating { color: #d68a00; font-size: 14px; }

  #emptyState { text-align: center; padding: 40px; color: #777; display: none; }

  footer { text-align: center; color: #777; font-size: 13px; padding: 20px; }
</style>
</head>
<body>

<header>
  <h1>Product Catalog</h1>
  <p>Filter by category and sort by price or rating.</p>
</header>

<main>
  <div class="controls">
    <div class="control-group">
      <label for="categoryFilter">Category</label>
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Apparel">Apparel</option>
        <option value="Home">Home</option>
        <option value="Sports">Sports</option>
      </select>
    </div>

    <div class="control-group">
      <label for="sortBy">Sort By</label>
      <select id="sortBy">
        <option value="default">Default</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating-desc">Rating: High to Low</option>
      </select>
    </div>

    <div id="resultCount"></div>
  </div>

  <div class="product-grid" id="productGrid"></div>
  <div id="emptyState">No products match this filter.</div>
</main>

<footer>Built to illustrate interactive filtering and sorting with JavaScript and the DOM.</footer>

<script>
  var products = [
    { name: "Wireless Headphones", category: "Electronics", price: 89.99, rating: 4.5 },
    { name: "Smart Watch", category: "Electronics", price: 149.99, rating: 4.2 },
    { name: "Bluetooth Speaker", category: "Electronics", price: 45.5, rating: 4.0 },
    { name: "Cotton T-Shirt", category: "Apparel", price: 19.99, rating: 4.3 },
    { name: "Denim Jacket", category: "Apparel", price: 59.99, rating: 4.6 },
    { name: "Running Shoes", category: "Apparel", price: 79.99, rating: 4.7 },
    { name: "Ceramic Mug Set", category: "Home", price: 24.99, rating: 4.1 },
    { name: "Throw Blanket", category: "Home", price: 34.99, rating: 4.4 },
    { name: "Table Lamp", category: "Home", price: 42.0, rating: 3.9 },
    { name: "Yoga Mat", category: "Sports", price: 29.99, rating: 4.5 },
    { name: "Dumbbell Set", category: "Sports", price: 65.0, rating: 4.6 },
    { name: "Water Bottle", category: "Sports", price: 14.99, rating: 4.2 }
  ];

  var categoryFilter = document.getElementById('categoryFilter');
  var sortBy = document.getElementById('sortBy');
  var productGrid = document.getElementById('productGrid');
  var emptyState = document.getElementById('emptyState');
  var resultCount = document.getElementById('resultCount');

  function renderProducts() {
    var filtered = products.slice();

    var cat = categoryFilter.value;
    if (cat !== 'all') {
      filtered = filtered.filter(function (p) { return p.category === cat; });
    }

    var sort = sortBy.value;
    if (sort === 'price-asc') {
      filtered.sort(function (a, b) { return a.price - b.price; });
    } else if (sort === 'price-desc') {
      filtered.sort(function (a, b) { return b.price - a.price; });
    } else if (sort === 'rating-desc') {
      filtered.sort(function (a, b) { return b.rating - a.rating; });
    }

    productGrid.innerHTML = '';
    resultCount.textContent = filtered.length + ' product' + (filtered.length !== 1 ? 's' : '');

    if (filtered.length === 0) {
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    filtered.forEach(function (p) {
      var card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML =
        '<span class="category">' + p.category + '</span>' +
        '<h3>' + p.name + '</h3>' +
        '<div class="price">$' + p.price.toFixed(2) + '</div>' +
        '<div class="rating">★ ' + p.rating.toFixed(1) + '</div>';
      productGrid.appendChild(card);
    });
  }

  categoryFilter.addEventListener('change', renderProducts);
  sortBy.addEventListener('change', renderProducts);

  renderProducts();
</script>

</body>
</html>
